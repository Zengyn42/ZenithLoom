# ZenithLoom Observability Server — Agent Configuration
# observability/config.toml
#
# Each [agents.<name>] section tells the server where to find the agent's
# entity.json (for topology) and SQLite db (for P2 replay).
#
# entity_json: path to the blueprint entity.json
# db_path:     path to the SQLite checkpoint database (P2, not used in P1)

